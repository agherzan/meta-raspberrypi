# Common configurations for supporting Filesystem Encryption (using fscrypt) in the Linux kernel for Raspberry Pi 3b+

# For debugging
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y

# Master crypto framework - NOT auto-selected by anything
CONFIG_CRYPTO=y

# Basic key management - NOT auto-selected by crypto algorithms
CONFIG_KEYS=y

# File-Based Encryption (fscrypt) specific configurations

# Core crypto algorithms (with massive auto-selection)
CONFIG_CRYPTO_AES=y
CONFIG_CRYPTO_XTS=y
CONFIG_CRYPTO_CTS=y
CONFIG_CRYPTO_SHA256=y

# fscrypt framework (not in this Kconfig - likely in fs/Kconfig)
CONFIG_FS_ENCRYPTION=y
CONFIG_FS_ENCRYPTION_ALGS=y
CONFIG_EXT4_FS_ENCRYPTION=y

# Key management for fscrypt
CONFIG_TRUSTED_KEYS=y
CONFIG_ENCRYPTED_KEYS=y